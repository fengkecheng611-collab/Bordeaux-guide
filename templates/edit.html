{% extends "base.html" %}
{% block title %}编辑文章 — 波尔多生活指南{% endblock %}

{% block content %}
<nav class="breadcrumb">
    <a href="{{ url_for('index') }}">首页</a> &rsaquo; 编辑文章
</nav>

<h1 class="page-title">✏️ 编辑文章</h1>

<form class="contribute-form" method="post" action="{{ url_for('edit_article', cat_key=cat_key, article_id=article_id, edit_key=edit_key) }}" enctype="multipart/form-data">
    <div class="form-group">
        <label for="title">文章标题 <span class="required">*</span></label>
        <input type="text" id="title" name="title" value="{{ article.title }}" required maxlength="100">
    </div>

    <div class="form-group">
        <label for="author">作者名</label>
        <input type="text" id="author" name="author" value="{{ article.author }}" maxlength="50">
    </div>

    <div class="form-group">
        <label for="content">正文内容 <span class="required">*</span></label>
        <p class="form-hint">支持 Markdown 格式。</p>
        <textarea id="content" name="content" rows="18" required>{{ body }}</textarea>
    </div>

    <div class="form-group">
        <label for="image">添加/更换配图（可选）</label>
        <p class="form-hint">支持 jpg / png / gif / webp，最大 5MB</p>
        <input type="file" id="image" name="image" accept="image/*">
    </div>

    <button type="submit" class="btn-submit">保存修改</button>
</form>
{% endblock %}
